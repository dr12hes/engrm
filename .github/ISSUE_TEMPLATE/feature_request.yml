name: Feature request
description: Suggest an improvement to Engrm
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Memory capture
        - Search / retrieval
        - Sync
        - Claude Code
        - Codex
        - MCP tools
        - Sentinel
        - Docs / packaging
