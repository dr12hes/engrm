name: Bug report
description: Report a defect in Engrm
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, agent, and environment if relevant.
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Agent
      options:
        - Claude Code
        - Codex
        - OpenClaw
        - Other MCP client
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets before pasting.
